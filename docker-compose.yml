# 智慧交通客服智能体 — Docker Compose
# 使用：复制 .env.example 为 .env，设置 MYSQL_ROOT_PASSWORD 与 DEEPSEEK_API_KEY 等，然后：
#   docker compose up -d --build

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_cs_agent}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8010}:8010"
    env_file:
      - .env
    environment:
      # 覆盖 .env 里面向本机开发时的值，确保在容器内走 TCP 连 compose 网络中的 MySQL
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_UNIX_SOCKET: ""
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_cs_agent}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
    volumes:
      # 会话 JSON 持久化（避免容器删除后对话丢失）
      - app_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  app_data:
